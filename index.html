<!DOCTYPE html>
<html>
<head>
    <title>Watch Full Video</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #0d0e12;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .wrapper {
            width: 100%;
            max-width: 650px;
            margin-top: 8vh;
        }

        .header-teks {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 12px;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        .watch { color: #ffffff; }
        .streaming { color: #ff3333; }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Pas dengan rasio gambar landscape kamu */
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            
            /* TERSAMBUNG KE GAMBAR RUS.JPG KAMU */
            background: url('rus.jpg') center/cover no-repeat;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            z-index: 1;
        }

        /* Tombol Play Putih Transparan Bulat Tengah */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .play-button:after {
            content: '';
            position: absolute;
            left: 26px;
            top: 19px;
            border-style: solid;
            border-width: 13px 0 13px 20px;
            border-color: transparent transparent transparent #333333;
        }

        /* Kontrol Durasi Palsu di Bawah Video */
        .fake-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            z-index: 3;
            font-size: 13px;
            color: #ffffff;
        }

        .control-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-right {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: #ff3333;
        }

        /* --- POP-UP KONFIRMASI USIA (18+) --- */
        .age-verification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 11, 14, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
            box-sizing: border-box;
        }

        .age-box {
            background: #1a1c23;
            border: 1px solid #2d313f;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .age-box h2 {
            color: #ff3333;
            margin-top: 0;
            font-size: 22px;
        }

        .age-box p {
            color: #ccc;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .btn-confirm {
            background: #ff3333;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="age-verification-overlay" id="ageOverlay">
    <div class="age-box">
        <h2>KONTEN DEWASA (18+)</h2>
        <p>Video ini mengandung materi khusus dewasa. Anda harus berusia minimal 18 tahun atau lebih untuk menonton tayangan streaming ini.</p>
        <button class="btn-confirm" onclick="verifyAge()">SAYA SUDAH BERUSIA 18+</button>
    </div>
</div>

<div class="wrapper">
    <div class="header-teks">
        <span class="watch">Watch</span>
        <span class="streaming">Streaming</span>
    </div>

    <a href="https://theoreticalassertshame.com/kinpdqmkw?key=308eaf66481cf68b5726bc4b540bb720" target="_blank">
        <div class="video-container">
            <div class="overlay"></div>
            <div class="play-button"></div>
            
            <div class="fake-controls">
                <div class="control-left">
                    <span>▶</span>
                    <span>🔊</span>
                    <span>00:00 / 01:24:15</span>
                </div>
                <div class="control-right">
                    <span>HD ⛶</span>
                </div>
            </div>
        </div>
    </a>
</div>

<script>
    function verifyAge() {
        document.getElementById('ageOverlay').style.display = 'none';
    }
</script>

</body>
</html>
